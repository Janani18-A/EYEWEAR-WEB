    <circle cx="25" cy="16" r="2" fill="currentColor"/>
    <path d="M15 24 Q20 28 25 24" fill="none" stroke="currentColor" stroke-width="2"/>
  </symbol>
  <symbol id="face-diamond" viewBox="0 0 40 40">

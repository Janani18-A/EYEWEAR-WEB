    <path d="M14 20 L26 20" stroke="currentColor" stroke-width="1.5"/>
  </symbol>
  <symbol id="shape-round" viewBox="0 0 40 40">
    <circle cx="20" cy="20" r="14" fill="none" stroke="currentColor" stroke-width="2"/>
    <path d="M14 20 L26 20" stroke="currentColor" stroke-width="1.5"/>
  </symbol>
  <symbol id="shape-aviator" viewBox="0 0 40 40">

    <circle cx="25" cy="18" r="2" fill="currentColor"/>
    <path d="M15 26 Q20 30 25 26" fill="none" stroke="currentColor" stroke-width="2"/>
  </symbol>
  <symbol id="face-square" viewBox="0 0 40 40">
    <rect x="6" y="4" width="28" height="32" rx="4" fill="none" stroke="currentColor" stroke-width="2"/>
